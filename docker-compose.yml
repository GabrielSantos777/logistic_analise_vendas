services:
  backend:
    build:
      context: ./backend
    container_name: logistic_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: logistic_frontend
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
